<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Cartas IGM Compradas en DSS"/>
    <title>Existencia cartas v2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-measure@3.1.0/dist/leaflet-measure.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-fullscreen@1.0.2/dist/leaflet.fullscreen.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-minimap@3.6.1/dist/Control.MiniMap.min.css"/>
    <style>
        :root { --gm-primary: #2c7fb8; --gm-accent: #f03b20; }
        html, body { margin: 0; padding: 0; height: 100%; font-family: system-ui, Arial, sans-serif; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; }
        .gm-title {
            background: var(--gm-primary); color: #fff; padding: 8px 14px;
            font-size: 16px; font-weight: 600; border-radius: 6px;
            box-shadow: 0 1px 6px rgba(0,0,0,.35); max-width: 60vw;
        }
        .gm-legend {
            background: #fff; padding: 10px 12px; border-radius: 6px; line-height: 1.5;
            box-shadow: 0 1px 6px rgba(0,0,0,.3); max-height: 45vh; overflow:auto; font-size: 13px;
        }
        .gm-legend h4 { margin: 0 0 6px; color: var(--gm-primary); font-size: 13px; }
        .gm-legend .row { display: flex; align-items: center; gap: 6px; }
        .gm-legend .swatch { width: 14px; height: 14px; border-radius: 3px; border: 1px solid #999; }
        .gm-layers { background:#fff; padding:8px 11px; border-radius:6px;
            box-shadow:0 1px 6px rgba(0,0,0,.3); font-size:12px; width:220px;
            max-height:55vh; overflow:auto; }
        .gm-layers h4 { margin:0 0 6px; color:var(--gm-primary); font-size:13px; }
        .gm-lrow { border-top:1px solid #eee; padding:5px 0; }
        .gm-lrow:first-of-type { border-top:none; }
        .gm-lhead { display:flex; align-items:center; gap:4px; }
        .gm-lhead label { flex:1; display:flex; align-items:center; gap:5px; cursor:pointer; }
        .gm-mv { border:1px solid #ccc; background:#f6f8fa; border-radius:3px;
            cursor:pointer; width:22px; line-height:18px; padding:0; font-size:10px; }
        .gm-mv:hover { background:#e6edf3; }
        .gm-op { width:100%; margin-top:4px; accent-color: var(--gm-primary); }
        .gm-logo img { max-height: 64px; max-width: 180px; background: rgba(255,255,255,.85);
            padding: 4px; border-radius: 6px; box-shadow: 0 1px 6px rgba(0,0,0,.3); }
        .leaflet-popup-content table { border-collapse: collapse; font-size: 12px; }
        .leaflet-popup-content td { border-bottom: 1px solid #eee; padding: 2px 6px; vertical-align: top; }
        .leaflet-popup-content td.k { font-weight: 600; color: var(--gm-primary); }
        .gm-popup { max-height: 60vh; overflow: auto; }
        .gm-media { display: block; max-width: 290px; width: 100%; margin: 8px auto 2px;
            border-radius: 4px; }
        .gm-hint { font-size: 10px; color: #888; }
        .leaflet-popup-content a { color: var(--gm-primary); font-weight: 600; text-decoration: none; }
        .leaflet-bar a { color: var(--gm-primary); }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.js"></script>
    <script src="https://unpkg.com/leaflet-measure@3.1.0/dist/leaflet-measure.js"></script>
    <script src="https://unpkg.com/leaflet-fullscreen@1.0.2/dist/Leaflet.fullscreen.min.js"></script>
    <script src="https://unpkg.com/leaflet-minimap@3.6.1/dist/Control.MiniMap.min.js"></script>
    <script src="data/layer_0.js"></script>
    <script src="data/layer_1.js"></script>
    <script src="data/layer_2.js"></script>
    <script src="app.js"></script>
</body>
</html>
